<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなでお絵描き</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header><h1>みんなでお絵描き</h1></header>
    <div class="toolbar">
      <label>色: <input id="color" type="color" value="#000000" /></label>
      <label>太さ: <input id="size" type="range" min="1" max="20" value="3" /></label>
      <button id="eraser">消しゴム</button>
      <button id="clear">消去</button>
      <span class="hint">他の人と同時に描けます</span>
    </div>
    <div class="status-row">
      <div class="my-name">あなた: <span id="myName">無名</span></div>
      <div class="participants-box">参加者:
        <ul id="participants"></ul>
      </div>
    </div>
    <div class="tips">※ 2本指タッチでスクロール、1本指で描画。貼り付けはCtrl+V / ⌘+V</div>
    <div class="canvas-wrap">
      <div id="remoteCursors" class="remote-cursors"></div>
      <canvas id="canvas"></canvas>
      <div id="cursorLabel" class="cursor-label" aria-hidden="true"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
